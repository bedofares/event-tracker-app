<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const base = "/incident-tracker-app";
      const path = window.location.pathname.replace(base, "");

      if (path && path !== "/") {
        window.location.replace(base + "/index.html?redirect=" + path);
      } else {
        window.location.replace(base + "/");
      }
    </script>
  </head>
  <body></body>
</html>
