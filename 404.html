<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const base = "/incident-tracker-app";
      const path = window.location.pathname.replace(base, "");

      // Only redirect if there's a real path, otherwise let index.html load
      if (path && path !== "/") {
        window.location.replace(base + "/index.html#" + path);
      } else {
        window.location.replace(base + "/");
      }
    </script>
  </head>
  <body></body>
</html>
